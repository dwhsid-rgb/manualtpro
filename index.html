<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>社内マニュアル</title>

<style>
:root{
--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;
--border:#e5e7eb;--accent:#2563eb;--danger:#ef4444;
--shadow:0 10px 24px rgba(0,0,0,.08);--r:16px;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}

header{position:sticky;top:0;background:rgba(246,247,251,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.wrap{max-width:1100px;margin:0 auto;padding:16px}

h1{margin:6px 0 0;font-size:26px}
.sub{margin:6px 0 12px;color:var(--muted);font-size:13px}

.btnRow{display:flex;gap:8px;flex-wrap:wrap}

.btn{
border:1px solid var(--border);
background:#fff;
border-radius:12px;
padding:8px 10px;
cursor:pointer;
font-weight:700;
}

.panel{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--r);
box-shadow:var(--shadow);
overflow:hidden;
margin-top:14px
}

.panel h2{
margin:0;
padding:14px 16px;
border-bottom:1px solid var(--border);
font-size:16px
}

.panel .body{padding:14px 16px}

details{border-top:1px solid var(--border)}
summary{padding:12px 16px;font-weight:800;cursor:pointer}

.item{
border:1px solid var(--border);
border-radius:12px;
margin:6px;
padding:10px;
cursor:pointer;
background:#fff
}

.itemTitle{font-weight:700}
.itemNote{font-size:12px;color:var(--muted)}

.hidden{display:none}

.content{
white-space:pre-wrap;
line-height:1.8;
}

</style>
</head>

<body>

<header>
<div class="wrap">

<h1 id="siteTitle">社内マニュアル</h1>
<div class="sub" id="siteDesc">読み込み中...</div>

<div class="btnRow">
<button class="btn" id="backBtn" style="display:none">← 一覧に戻る</button>
<button class="btn" id="copyLinkBtn">リンクコピー</button>
<button class="btn" id="loadPublishedBtn">公開データ読み込み</button>
<button class="btn" id="exportBtn">data.json書き出し</button>
<button class="btn" id="importBtn">読み込み</button>
<span id="modePill">閲覧</span>
</div>

</div>
</header>

<div class="wrap">

<div id="listView" class="panel">
<h2>目次</h2>
<div id="toc"></div>
</div>

<div id="detailView" class="panel hidden">
<h2 id="detailTitle"></h2>

<div class="body">

<div id="detailNote" style="color:#6b7280;margin-bottom:10px"></div>

<div id="detailBody" class="content"></div>

</div>
</div>

</div>

<script>

const STORAGE_KEY="manual_browser_editor_simple_v1"
const isEditMode=new URLSearchParams(location.search).get("edit")==="1"
const $=id=>document.getElementById(id)

const state={
data:null,
current:{catId:null,itemId:null}
}

function nowISO(){return new Date().toISOString()}

function shortId(){return Math.random().toString(36).slice(2,10)}

function defaultData(){
return{
site:{
title:"社内マニュアル",
desc:"カテゴリ → 項目 → 詳細"
},
categories:[]
}
}

function saveLocal(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(state.data))
render()
}

function loadLocal(){
try{
const raw=localStorage.getItem(STORAGE_KEY)
if(!raw)return null
return JSON.parse(raw)
}catch{return null}
}

async function loadPublished(){
const res=await fetch("./data.json?v="+Date.now(),{cache:"no-store"})
const data=await res.json()
state.data=data
saveLocal()
}

function setHash(c,i){
location.hash="#/c/"+c+"/i/"+i
}

function getHash(){
const m=(location.hash||"").match(/^#\/c\/([^/]+)\/i\/([^/]+)/)
if(!m)return{}
return{catId:m[1],itemId:m[2]}
}

function clearHash(){
history.replaceState(null,"",location.pathname+location.search)
}

function findCat(id){
return state.data.categories.find(c=>c.id===id)
}

function findItem(c,i){
const cat=findCat(c)
return cat?.items.find(x=>x.id===i)
}

function showList(){
$("listView").classList.remove("hidden")
$("detailView").classList.add("hidden")
$("backBtn").style.display="none"
}

function showDetail(){
$("listView").classList.add("hidden")
$("detailView").classList.remove("hidden")
$("backBtn").style.display=""
}

function renderTOC(){

const toc=$("toc")
toc.innerHTML=""

state.data.categories.forEach(c=>{

const d=document.createElement("details")
d.open=true

const s=document.createElement("summary")
s.textContent=c.title
d.appendChild(s)

c.items.forEach(it=>{

const el=document.createElement("div")
el.className="item"

el.innerHTML=
"<div class=itemTitle>"+it.title+"</div>"+
"<div class=itemNote>"+(it.note||"")+"</div>"

el.onclick=()=>openDetail(c.id,it.id)

d.appendChild(el)

})

toc.appendChild(d)

})

}

function openDetail(c,i){

const cat=findCat(c)
const it=findItem(c,i)

if(!cat||!it)return

state.current={catId:c,itemId:i}

setHash(c,i)

$("detailTitle").textContent=cat.title+" / "+it.title
$("detailNote").textContent=it.note||""
$("detailBody").textContent=it.body||""

showDetail()

}

function render(){

$("siteTitle").textContent=state.data.site.title
$("siteDesc").textContent=state.data.site.desc

renderTOC()

const h=getHash()

if(h.catId&&h.itemId){
openDetail(h.catId,h.itemId)
}else{
showList()
}

}

$("backBtn").onclick=()=>{
state.current={catId:null,itemId:null}
clearHash()
showList()
}

$("copyLinkBtn").onclick=async()=>{
await navigator.clipboard.writeText(location.href)
alert("コピーしました")
}

$("loadPublishedBtn").onclick=loadPublished

$("exportBtn").onclick=()=>{
const blob=new Blob([JSON.stringify(state.data,null,2)],{type:"application/json"})
const url=URL.createObjectURL(blob)
const a=document.createElement("a")
a.href=url
a.download="data.json"
a.click()
}

$("importBtn").onclick=()=>{
const raw=prompt("JSON貼り付け")
if(!raw)return
state.data=JSON.parse(raw)
saveLocal()
}

window.addEventListener("hashchange",render)

state.data=loadLocal()||defaultData()

render()

</script>

</body>
</html>
