<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>社内マニュアル</title>
<style>
body{margin:0;font-family:sans-serif;background:#f6f7fb;color:#111}
header{position:sticky;top:0;background:#fff;border-bottom:1px solid #ddd;padding:14px;z-index:20}
.wrap{max-width:900px;margin:auto;padding:16px}
.top{display:flex;gap:10px;align-items:flex-start}
.main{flex:1}
h1{margin:0 0 8px}
.sub{color:#666;font-size:13px;margin-bottom:10px}
.row{display:flex;gap:8px;flex-wrap:wrap}
button,input,textarea{font:inherit}
button{padding:8px 10px;border:1px solid #ddd;border-radius:10px;background:#fff}
input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px}
textarea{min-height:180px}
.panel{background:#fff;border:1px solid #ddd;border-radius:14px;padding:14px;margin-top:14px}
.item{border:1px solid #ddd;border-radius:12px;padding:10px;margin-top:8px;cursor:pointer;background:#fff}
.item small{color:#666}
.hidden{display:none}
.err{background:#fff1f2;border:1px solid #f5c2c7;color:#b42318;padding:10px;border-radius:12px;margin-top:14px;white-space:pre-wrap}
.menuBtn{width:44px;height:44px;padding:0;display:flex;align-items:center;justify-content:center}
.bars{width:18px;height:14px;position:relative}
.bars span{position:absolute;left:0;width:100%;height:2px;background:#111;border-radius:2px}
.bars span:nth-child(1){top:0}.bars span:nth-child(2){top:6px}.bars span:nth-child(3){top:12px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;z-index:30}
.ov.show{display:block}
.drawer{position:fixed;left:-320px;top:0;width:300px;max-width:84vw;height:100vh;background:#fff;border-right:1px solid #ddd;z-index:40;transition:.2s;padding:14px;overflow:auto}
.drawer.show{left:0}
.dHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dCat{border-top:1px solid #eee;padding-top:8px;margin-top:8px}
.dCatBtn{width:100%;text-align:left;font-weight:700;background:#fff;border:none;padding:8px 0;cursor:pointer}
.dItems{display:none;padding-left:8px}
.dItems.show{display:block}
.dItem{padding:8px 10px;border:1px solid #ddd;border-radius:10px;margin:6px 0;background:#fff;cursor:pointer}
</style>
</head>
<body>

<div id="ov" class="ov"></div>

<div id="drawer" class="drawer">
  <div class="dHead">
    <b>カテゴリ</b>
    <button id="closeMenu">×</button>
  </div>
  <div id="drawerList"></div>
</div>

<header>
  <div class="top">
    <button id="menuBtn" class="menuBtn">
      <div class="bars"><span></span><span></span><span></span></div>
    </button>

    <div class="main">
      <h1 id="title">社内マニュアル</h1>
      <div class="sub" id="desc">読み込み中...</div>
      <div class="row">
        <button id="back" class="hidden">← 一覧</button>
        <button id="copy">リンクコピー</button>
        <button id="load">公開読込</button>
        <button id="exp">書き出し</button>
        <button id="imp">読み込み</button>
        <button id="addCat" class="hidden">カテゴリ追加</button>
        <span id="mode">閲覧</span>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="err"></div>

  <div id="list" class="panel"></div>

  <div id="detail" class="panel hidden">
    <h2 id="dTitle"></h2>
    <div id="dNote" style="color:#666;margin-bottom:10px"></div>
    <div id="dBody" style="white-space:pre-wrap;line-height:1.8"></div>

    <div id="editBox" class="hidden" style="margin-top:16px">
      <div style="margin-top:8px">カテゴリ名</div>
      <input id="eCat">
      <div style="margin-top:8px">項目名</div>
      <input id="eTitle">
      <div style="margin-top:8px">補足</div>
      <input id="eNote">
      <div style="margin-top:8px">本文</div>
      <textarea id="eBody"></textarea>
      <div class="row" style="margin-top:10px">
        <button id="save">保存</button>
        <button id="delItem">項目削除</button>
        <button id="delCat">カテゴリ削除</button>
      </div>
    </div>
  </div>
</div>

<script>
const KEY="manual_min_v2";
const edit=new URLSearchParams(location.search).get("edit")==="1";
const $=id=>document.getElementById(id);
const state={data:null,catId:null,itemId:null};

function def(){return{site:{title:"社内マニュアル",desc:"カテゴリ → 項目 → 詳細"},categories:[]}}
function msg(t){$("err").innerHTML=t?'<div class="err">'+t+'</div>':""}
function gid(p){return p+"_"+Math.random().toString(36).slice(2,8)}

function norm(x){
  if(typeof x==="string") x=JSON.parse(x);
  if(Array.isArray(x)) x={categories:x};
  if(x&&x.data) x=x.data;
  if(x&&!x.site&&(x.title||x.desc||x.categories)){
    x={site:{title:x.title||"社内マニュアル",desc:x.desc||x.description||"カテゴリ → 項目 → 詳細"},categories:x.categories||[]}
  }
  if(!x||typeof x!=="object") x=def();
  return{
    site:{
      title:x.site&&x.site.title||"社内マニュアル",
      desc:x.site&&x.site.desc||"カテゴリ → 項目 → 詳細"
    },
    categories:(Array.isArray(x.categories)?x.categories:[]).map((c,ci)=>({
      id:c.id||gid("cat"),
      title:c.title||c.name||("カテゴリ"+(ci+1)),
      items:(Array.isArray(c.items)?c.items:[]).map((it,ii)=>({
        id:it.id||gid("item"),
        title:it.title||it.name||("項目"+(ii+1)),
        note:it.note||it.summary||"",
        body:it.body||it.content||it.text||""
      }))
    }))
  }
}

function save(){localStorage.setItem(KEY,JSON.stringify(state.data));render()}
function loadLocal(){try{return JSON.parse(localStorage.getItem(KEY)||"null")}catch{return null}}
function findCat(id){return state.data.categories.find(c=>c.id===id)}
function findItem(cid,iid){const c=findCat(cid);return c?c.items.find(i=>i.id===iid):null}
function setHash(cid,iid){const h="#/c/"+encodeURIComponent(cid)+"/i/"+encodeURIComponent(iid);if(location.hash!==h)location.hash=h}
function getHash(){const m=(location.hash||"").match(/^#\/c\/([^/]+)\/i\/([^/]+)/);return m?{catId:decodeURIComponent(m[1]),itemId:decodeURIComponent(m[2])}:{}}
function clearHash(){history.replaceState(null,"",location.pathname+location.search)}
function showList(){$("list").classList.remove("hidden");$("detail").classList.add("hidden");$("back").classList.add("hidden")}
function showDetail(){$("list").classList.add("hidden");$("detail").classList.remove("hidden");$("back").classList.remove("hidden")}
function openMenu(){$("ov").classList.add("show");$("drawer").classList.add("show")}
function closeMenu(){$("ov").classList.remove("show");$("drawer").classList.remove("show")}

function openDetail(cid,iid,upd=true){
  const c=findCat(cid),it=findItem(cid,iid);
  if(!c||!it)return;
  state.catId=cid;state.itemId=iid;
  $("dTitle").textContent=c.title+" / "+it.title;
  $("dNote").textContent=it.note||"";
  $("dBody").textContent=it.body||"";
  $("editBox").classList.toggle("hidden",!edit);
  if(edit){
    $("eCat").value=c.title;
    $("eTitle").value=it.title;
    $("eNote").value=it.note||"";
    $("eBody").value=it.body||"";
  }
  showDetail();
  if(upd)setHash(cid,iid);
}

function renderDrawer(){
  const box=$("drawerList");
  box.innerHTML="";
  state.data.categories.forEach(c=>{
    const wrap=document.createElement("div");
    wrap.className="dCat";

    const b=document.createElement("button");
    b.className="dCatBtn";
    b.textContent="▶ "+c.title;

    const items=document.createElement("div");
    items.className="dItems";

    b.onclick=()=>{
      const open=items.classList.toggle("show");
      b.textContent=(open?"▼ ":"▶ ")+c.title;
    };

    c.items.forEach(it=>{
      const el=document.createElement("div");
      el.className="dItem";
      el.innerHTML="<b>"+it.title+"</b>"+(it.note?'<br><small>'+it.note+"</small>":"");
      el.onclick=()=>{openDetail(c.id,it.id,true);closeMenu()};
      items.appendChild(el);
    });

    wrap.appendChild(b);
    wrap.appendChild(items);
    box.appendChild(wrap);
  });
}

function renderList(){
  const box=$("list");
  box.innerHTML="<h2>目次</h2>";
  if(!state.data.categories.length){box.innerHTML+='<div style="color:#666">カテゴリがありません</div>';return}
  state.data.categories.forEach(c=>{
    const sec=document.createElement("div");
    sec.style.marginTop="12px";
    sec.innerHTML="<h3>"+c.title+"</h3>";
    if(edit){
      const b=document.createElement("button");
      b.textContent="+ 項目追加";
      b.onclick=()=>{
        const it={id:gid("item"),title:"新規項目",note:"",body:""};
        c.items.push(it);save();openDetail(c.id,it.id,false);
      };
      sec.appendChild(b);
    }
    c.items.forEach(it=>{
      const el=document.createElement("div");
      el.className="item";
      el.innerHTML="<b>"+it.title+"</b><br><small>"+(it.note||"")+"</small>";
      el.onclick=()=>openDetail(c.id,it.id,true);
      sec.appendChild(el);
    });
    box.appendChild(sec);
  });
}

function render(){
  msg("");
  state.data=norm(state.data);
  $("title").textContent=state.data.site.title;
  $("desc").textContent=state.data.site.desc;
  $("mode").textContent=edit?"編集":"閲覧";
  $("addCat").classList.toggle("hidden",!edit);
  renderList();
  renderDrawer();
  const h=getHash();
  if(h.catId&&h.itemId&&findItem(h.catId,h.itemId))openDetail(h.catId,h.itemId,false);
  else showList();
}

$("menuBtn").onclick=openMenu;
$("closeMenu").onclick=closeMenu;
$("ov").onclick=closeMenu;
$("back").onclick=()=>{clearHash();showList()}
$("copy").onclick=async()=>{try{await navigator.clipboard.writeText(location.href);alert("コピーしました")}catch{alert("失敗")}}
$("load").onclick=async()=>{
  try{
    const r=await fetch("./data.json?v="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    state.data=norm(await r.json());save();alert("公開データを読み込みました");
  }catch(e){msg("公開読込失敗\n"+e.message)}
};
$("exp").onclick=()=>{
  const blob=new Blob([JSON.stringify(state.data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="data.json";a.click();
};
$("imp").onclick=()=>{
  try{
    const raw=prompt("JSONを貼り付け");
    if(!raw)return;
    state.data=norm(raw);save();alert("読み込みました");
  }catch(e){msg("JSONの形式が正しくありません")}
};
$("addCat").onclick=()=>{state.data.categories.push({id:gid("cat"),title:"新規カテゴリ",items:[]});save()}
$("save").onclick=()=>{
  const c=findCat(state.catId),it=findItem(state.catId,state.itemId);
  if(!c||!it)return;
  c.title=$("eCat").value.trim()||"新規カテゴリ";
  it.title=$("eTitle").value.trim()||"無題";
  it.note=$("eNote").value;
  it.body=$("eBody").value;
  save();openDetail(c.id,it.id,false);alert("保存しました");
};
$("delItem").onclick=()=>{
  const c=findCat(state.catId);if(!c)return;
  if(!confirm("この項目を削除しますか？"))return;
  c.items=c.items.filter(x=>x.id!==state.itemId);
  state.catId=null;state.itemId=null;save();clearHash();showList();
};
$("delCat").onclick=()=>{
  if(!confirm("このカテゴリを削除しますか？"))return;
  state.data.categories=state.data.categories.filter(x=>x.id!==state.catId);
  state.catId=null;state.itemId=null;save();clearHash();showList();
};

window.addEventListener("hashchange",()=>{
  const h=getHash();
  if(h.catId&&h.itemId&&findItem(h.catId,h.itemId))openDetail(h.catId,h.itemId,false);
  else showList();
});

try{
  state.data=norm(loadLocal()||def());
  render();
}catch(e){
  state.data=def();
  msg("初期化エラー\n"+e.message);
  render();
}
</script>
</body>
</html>
