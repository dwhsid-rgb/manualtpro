<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow">
  <title>社内マニュアル</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --text:#111827; --muted:#6b7280; --border:#e5e7eb;
      --accent:#2563eb; --shadow:0 10px 24px rgba(0,0,0,.08); --r:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:var(--bg); color:var(--text);
    }
    header{
      position:sticky; top:0; z-index:10;
      background:rgba(246,247,251,.9);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
    }
    .wrap{max-width:1180px; margin:0 auto; padding:16px}
    h1{margin:6px 0 0; font-size:26px}
    .sub{margin:6px 0 12px; color:var(--muted); font-size:13px; line-height:1.5}
    .toprow{display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap}
    .grid{display:grid; gap:14px; grid-template-columns:1fr}
    @media(min-width:900px){ .grid{grid-template-columns:440px 1fr} }
    .panel{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel h2{
      margin:0; padding:14px 16px; font-size:16px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .panel .body{padding:14px 16px}
    .search{
      width:100%; padding:12px;
      border-radius:14px; border:1px solid var(--border);
      outline:none; background:#fff;
    }
    details{border-top:1px solid var(--border)}
    details:first-of-type{border-top:none}
    summary{
      list-style:none; cursor:pointer;
      padding:14px 16px; font-weight:800;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    summary::-webkit-details-marker{display:none}
    .badge{
      font-size:12px; color:var(--muted);
      border:1px solid var(--border);
      padding:5px 9px; border-radius:999px; white-space:nowrap;
    }
    .items{padding:0 8px 10px}
    .itemBtn{
      width:100%; text-align:left; padding:12px; margin:6px 0;
      border-radius:14px; border:1px solid var(--border);
      background:#fff; cursor:pointer;
      display:flex; gap:10px; align-items:flex-start; justify-content:space-between;
    }
    .itemBtn:hover{border-color:#c7d2fe}
    .itemBtn.active{border-color:#93c5fd; box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .itemTitle{font-weight:800}
    .itemNote{color:var(--muted); font-size:12px; margin-top:4px; line-height:1.35}
    .content{white-space:pre-wrap; line-height:1.85; font-size:15px}
    .hint{color:var(--muted); font-size:13px; line-height:1.6}
    .pill{
      padding:6px 10px; border-radius:999px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.02);
      font-size:12px; color:var(--muted);
    }
    .btnRow{display:flex; gap:8px; flex-wrap:wrap}
    .btn{
      border:1px solid var(--border);
      background:#fff;
      border-radius:12px;
      padding:9px 10px;
      cursor:pointer;
      font-weight:750;
    }
    .btn:hover{border-color:#c7d2fe}
    .k{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    .metaLine{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
    .hr{height:1px; background:var(--border); margin:12px 0}
    .small{font-size:12px; color:var(--muted); line-height:1.6}
    .error{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid #fecaca;
      background:#fef2f2;
      color:#991b1b;
      font-size:13px;
      line-height:1.6;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="toprow">
        <div>
          <h1 id="siteTitle">社内マニュアル</h1>
          <div class="sub" id="siteDesc">読み込み中...</div>
        </div>
        <div class="btnRow">
          <button class="btn" id="copyLinkBtn">この詳細リンクをコピー</button>
          <span class="pill">共有版</span>
        </div>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="grid">
      <div class="panel">
        <h2>
          <span>目次</span>
          <span class="pill" id="countPill">0件</span>
        </h2>
        <div class="body">
          <input class="search" id="q" type="search" placeholder="検索（カテゴリ / 項目 / 本文）" />
          <div class="small" style="margin-top:10px">
            更新は <span class="k">data.json</span> を編集して GitHub にコミットしてください。
          </div>
          <div class="error" id="loadError" style="display:none;"></div>
        </div>
        <div id="toc"></div>
      </div>

      <div class="panel">
        <h2>
          <span id="detailTitle">詳細</span>
        </h2>
        <div class="body">
          <div class="metaLine">
            <span class="pill" id="detailCatPill">-</span>
            <span class="pill" id="detailUpdatedPill">更新: -</span>
          </div>
          <div style="height:10px"></div>
          <div class="hint" id="detailNote">左から項目を選んでください。</div>
          <div class="hr"></div>
          <div class="content" id="detailBody"></div>
          <div style="height:14px"></div>
          <div class="small" id="detailIds">#</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const state = {
      data: null,
      query: "",
      current: { catId:null, itemId:null }
    };

    function fmt(iso){
      try{
        const d = new Date(iso);
        return d.toLocaleString("ja-JP", {
          year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit"
        });
      }catch(e){ return "-"; }
    }

    function normalize(s){
      return String(s || "").toLowerCase().trim();
    }

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));
    }

    function getHash(){
      const h = location.hash || "";
      const m = h.match(/^#\/c\/([^\/]+)\/i\/([^\/]+)$/);
      if(!m) return {catId:null,itemId:null};
      return {
        catId: decodeURIComponent(m[1]),
        itemId: decodeURIComponent(m[2])
      };
    }

    function setHash(catId, itemId){
      location.hash = `#/c/${encodeURIComponent(catId)}/i/${encodeURIComponent(itemId)}`;
    }

    function findCat(catId){
      return state.data?.categories?.find(c => c.id === catId) || null;
    }

    function findItem(catId, itemId){
      const c = findCat(catId);
      if(!c) return null;
      return c.items.find(i => i.id === itemId) || null;
    }

    function filterCats(){
      if(!state.data) return [];
      const q = normalize(state.query);
      if(!q) return state.data.categories;

      const out = [];
      for(const c of state.data.categories){
        const catHit = normalize(c.title).includes(q);
        const items = c.items.filter(i => {
          const hay = normalize(`${i.title} ${i.note || ""} ${i.body || ""}`);
          return hay.includes(q);
        });
        if(catHit) out.push({...c, items:[...c.items]});
        else if(items.length) out.push({...c, items});
      }
      return out;
    }

    function renderHeader(){
      if(!state.data) return;
      $("siteTitle").textContent = state.data.site?.title || "社内マニュアル";
      $("siteDesc").textContent = state.data.site?.desc || "";
      document.title = state.data.site?.title || "社内マニュアル";
    }

    function renderTOC(){
      const tocEl = $("toc");
      tocEl.innerHTML = "";

      const cats = filterCats();
      let total = 0;

      for(const c of cats){
        total += c.items.length;

        const d = document.createElement("details");
        d.open = true;

        const s = document.createElement("summary");
        s.innerHTML = `
          <span>${escapeHtml(c.title)}</span>
          <span class="badge">${c.items.length}件</span>
        `;
        d.appendChild(s);

        const box = document.createElement("div");
        box.className = "items";

        for(const it of c.items){
          const b = document.createElement("button");
          b.className = "itemBtn";
          b.type = "button";
          b.dataset.cat = c.id;
          b.dataset.item = it.id;
          b.innerHTML = `
            <div>
              <div class="itemTitle">${escapeHtml(it.title)}</div>
              <div class="itemNote">${escapeHtml(it.note || "")}</div>
            </div>
            <div class="badge k">#${escapeHtml(c.id)}/${escapeHtml(it.id)}</div>
          `;
          b.addEventListener("click", ()=> openDetail(c.id, it.id));
          box.appendChild(b);
        }

        d.appendChild(box);
        tocEl.appendChild(d);
      }

      $("countPill").textContent = `${total}件`;
      markActive();
    }

    function markActive(){
      const {catId, itemId} = state.current;
      document.querySelectorAll(".itemBtn").forEach(btn => {
        const ok = btn.dataset.cat === catId && btn.dataset.item === itemId;
        btn.classList.toggle("active", ok);
      });
    }

    function openDetail(catId, itemId){
      const c = findCat(catId);
      const it = findItem(catId, itemId);
      if(!c || !it) return;

      state.current = {catId, itemId};
      setHash(catId, itemId);

      $("detailTitle").textContent = `${c.title} / ${it.title}`;
      $("detailCatPill").textContent = `カテゴリ: ${c.title}`;
      $("detailUpdatedPill").textContent = `更新: ${fmt(it.updatedAt || it.createdAt)}`;
      $("detailNote").textContent = it.note || "";
      $("detailBody").textContent = it.body || "";
      $("detailIds").textContent = `c:${c.id} / i:${it.id}`;

      markActive();
      $("detailTitle").scrollIntoView({behavior:"smooth", block:"start"});
    }

    function ensureFirstSelection(){
      if(!state.data?.categories?.length) return;

      const h = getHash();
      if(h.catId && h.itemId && findItem(h.catId, h.itemId)){
        openDetail(h.catId, h.itemId);
        return;
      }

      const firstCat = state.data.categories[0];
      const firstItem = firstCat?.items?.[0];
      if(firstCat && firstItem){
        openDetail(firstCat.id, firstItem.id);
      }
    }

    function render(){
      renderHeader();
      renderTOC();
      ensureFirstSelection();
    }

    async function loadData(){
      try{
        const res = await fetch("./data.json", { cache: "no-store" });
        if(!res.ok) throw new Error(`data.json の読み込み失敗 (${res.status})`);
        const data = await res.json();

        if(!data?.categories || !Array.isArray(data.categories)){
          throw new Error("data.json の形式が不正です");
        }

        state.data = data;
        render();
      }catch(err){
        $("loadError").style.display = "";
        $("loadError").textContent =
          "データを読み込めませんでした。data.json が存在するか、JSONの書式が正しいか確認してください。";
        console.error(err);
      }
    }

    $("q").addEventListener("input", (e)=>{
      state.query = e.target.value;
      renderTOC();
    });

    window.addEventListener("hashchange", ()=>{
      const h = getHash();
      if(h.catId && h.itemId && findItem(h.catId, h.itemId)){
        openDetail(h.catId, h.itemId);
      }
    });

    $("copyLinkBtn").addEventListener("click", async ()=>{
      const url = location.href;
      try{
        await navigator.clipboard.writeText(url);
        alert("リンクをコピーしました！");
      }catch(e){
        prompt("コピーできない場合はこれを手動コピーしてね", url);
      }
    });

    loadData();
  </script>
</body>
</html>
