<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>社内マニュアル</title>

<style>
:root{
--bg:#f6f7fb;
--card:#fff;
--text:#111827;
--muted:#6b7280;
--border:#e5e7eb;
--accent:#2563eb;
--danger:#ef4444;
--shadow:0 10px 24px rgba(0,0,0,.08);
--r:16px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
background:var(--bg);
color:var(--text)
}

header{
position:sticky;
top:0;
z-index:10;
background:#fff;
border-bottom:1px solid var(--border)
}

.wrap{
max-width:1100px;
margin:auto;
padding:16px
}

h1{margin:6px 0 0;font-size:26px}

.sub{
margin:6px 0 12px;
color:var(--muted);
font-size:13px
}

.btnRow{
display:flex;
gap:8px;
flex-wrap:wrap
}

.btn{
border:1px solid var(--border);
background:#fff;
border-radius:12px;
padding:8px 10px;
cursor:pointer;
font-weight:700
}

.panel{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--r);
box-shadow:var(--shadow);
overflow:hidden;
margin-top:14px
}

.panel h2{
margin:0;
padding:14px 16px;
border-bottom:1px solid var(--border);
font-size:16px
}

.panel .body{
padding:14px 16px
}

details{
border-top:1px solid var(--border)
}

summary{
padding:12px 16px;
font-weight:800;
cursor:pointer
}

.item{
border:1px solid var(--border);
border-radius:12px;
margin:6px;
padding:10px;
cursor:pointer;
background:#fff
}

.itemTitle{font-weight:700}
.itemNote{font-size:12px;color:var(--muted)}

.hidden{display:none}

.content{
white-space:pre-wrap;
line-height:1.8
}

textarea{
width:100%;
height:200px;
border:1px solid var(--border);
border-radius:12px;
padding:10px;
font-family:inherit
}

input{
width:100%;
border:1px solid var(--border);
border-radius:10px;
padding:6px
}

</style>
</head>

<body>

<header>
<div class="wrap">

<h1 id="siteTitle">社内マニュアル</h1>
<div class="sub" id="siteDesc"></div>

<div class="btnRow">

<button class="btn" id="backBtn" style="display:none">← 一覧</button>

<button class="btn" id="copyLinkBtn">リンクコピー</button>

<button class="btn" id="loadPublishedBtn">公開読込</button>

<button class="btn" id="exportBtn">data.json書き出し</button>

<button class="btn" id="importBtn">読み込み</button>

<button class="btn hidden" id="addCatBtn">カテゴリ追加</button>

<span id="modePill"></span>

</div>

</div>
</header>

<div class="wrap">

<div id="listView" class="panel">
<h2>目次</h2>
<div id="toc"></div>
</div>

<div id="detailView" class="panel hidden">

<h2 id="detailTitle"></h2>

<div class="body">

<div id="detailNote"></div>

<div id="detailBody" class="content"></div>

<div id="editor" class="hidden">

<input id="editTitle">

<input id="editNote">

<textarea id="editBody"></textarea>

<button class="btn" id="saveBtn">保存</button>

</div>

</div>

</div>

</div>

<script>

const STORAGE_KEY="manual_editor_v1"

const isEditMode=new URLSearchParams(location.search).get("edit")==="1"

const $=id=>document.getElementById(id)

const state={
data:null,
current:{catId:null,itemId:null}
}

function shortId(){
return Math.random().toString(36).slice(2,8)
}

function defaultData(){
return{
site:{
title:"社内マニュアル",
desc:"カテゴリ → 項目 → 詳細"
},
categories:[]
}
}

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(state.data))
render()
}

function loadLocal(){
try{
return JSON.parse(localStorage.getItem(STORAGE_KEY))
}catch{
return null
}
}

async function loadPublished(){

const r=await fetch("./data.json")

const d=await r.json()

state.data=d

save()

}

function renderTOC(){

const toc=$("toc")

toc.innerHTML=""

state.data.categories.forEach(c=>{

const d=document.createElement("details")

d.open=true

const s=document.createElement("summary")

s.textContent=c.title

d.appendChild(s)

if(isEditMode){

const add=document.createElement("button")

add.textContent="+項目"

add.className="btn"

add.onclick=e=>{
e.stopPropagation()

c.items.push({
id:shortId(),
title:"新規項目",
note:"",
body:""
})

save()

}

d.appendChild(add)

}

c.items.forEach(it=>{

const el=document.createElement("div")

el.className="item"

el.innerHTML=
"<div class=itemTitle>"+it.title+"</div>"+
"<div class=itemNote>"+(it.note||"")+"</div>"

el.onclick=()=>openDetail(c.id,it.id)

d.appendChild(el)

})

toc.appendChild(d)

})

}

function findCat(id){
return state.data.categories.find(c=>c.id===id)
}

function findItem(c,i){
return findCat(c).items.find(x=>x.id===i)
}

function openDetail(c,i){

const cat=findCat(c)

const it=findItem(c,i)

state.current={catId:c,itemId:i}

$("detailTitle").textContent=it.title

$("detailNote").textContent=it.note

$("detailBody").textContent=it.body

$("editor").classList.toggle("hidden",!isEditMode)

$("editTitle").value=it.title
$("editNote").value=it.note
$("editBody").value=it.body

$("listView").classList.add("hidden")

$("detailView").classList.remove("hidden")

$("backBtn").style.display=""

}

function render(){

$("siteTitle").textContent=state.data.site.title

$("siteDesc").textContent=state.data.site.desc

$("modePill").textContent=isEditMode?"編集モード":"閲覧"

$("addCatBtn").classList.toggle("hidden",!isEditMode)

renderTOC()

}

$("backBtn").onclick=()=>{
$("detailView").classList.add("hidden")
$("listView").classList.remove("hidden")
}

$("copyLinkBtn").onclick=()=>{
navigator.clipboard.writeText(location.href)
}

$("exportBtn").onclick=()=>{

const blob=new Blob([JSON.stringify(state.data,null,2)])

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="data.json"

a.click()

}

$("importBtn").onclick=()=>{

const raw=prompt("JSON貼る")

if(!raw)return

state.data=JSON.parse(raw)

save()

}

$("addCatBtn").onclick=()=>{

state.data.categories.push({
id:shortId(),
title:"新カテゴリ",
items:[]
})

save()

}

$("saveBtn").onclick=()=>{

const c=state.current.catId

const i=state.current.itemId

const it=findItem(c,i)

it.title=$("editTitle").value
it.note=$("editNote").value
it.body=$("editBody").value

save()

openDetail(c,i)

}

state.data=loadLocal()||defaultData()

render()

</script>

</body>
</html>
