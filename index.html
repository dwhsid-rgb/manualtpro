<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow">
  <title>社内マニュアル</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --text:#111827; --muted:#6b7280; --border:#e5e7eb;
      --accent:#2563eb; --danger:#ef4444; --shadow:0 10px 24px rgba(0,0,0,.08); --r:16px;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; background:var(--bg); color:var(--text)}
    header{position:sticky; top:0; background:rgba(246,247,251,.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); z-index:10}
    .wrap{max-width:1180px; margin:0 auto; padding:16px}
    h1{margin:6px 0 0; font-size:26px}
    .sub{margin:6px 0 12px; color:var(--muted); font-size:13px; line-height:1.5}
    .toprow{display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap}
    .grid{display:grid; gap:14px; grid-template-columns:1fr}
    @media(min-width:900px){ .grid{grid-template-columns: 440px 1fr} }
    .panel{background:var(--card); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--shadow); overflow:hidden}
    .panel h2{margin:0; padding:14px 16px; font-size:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:10px}
    .panel .body{padding:14px 16px}
    .search{width:100%; padding:12px 12px; border-radius:14px; border:1px solid var(--border); outline:none; background:#fff}
    details{border-top:1px solid var(--border)}
    details:first-of-type{border-top:none}
    summary{list-style:none; cursor:pointer; padding:14px 16px; font-weight:800; display:flex; align-items:center; justify-content:space-between; gap:10px}
    summary::-webkit-details-marker{display:none}
    .badge{font-size:12px; color:var(--muted); border:1px solid var(--border); padding:5px 9px; border-radius:999px; white-space:nowrap}
    .items{padding:0 8px 10px}
    .itemBtn{
      width:100%; text-align:left; padding:12px 12px; margin:6px 0;
      border-radius:14px; border:1px solid var(--border); background:#fff; cursor:pointer;
      display:flex; gap:10px; align-items:flex-start; justify-content:space-between;
    }
    .itemBtn:hover{border-color:#c7d2fe}
    .itemBtn.active{border-color:#93c5fd; box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .itemTitle{font-weight:800}
    .itemNote{color:var(--muted); font-size:12px; margin-top:4px; line-height:1.35}
    .k{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    .content{white-space:pre-wrap; line-height:1.85; font-size:15px}
    .hint{color:var(--muted); font-size:13px; line-height:1.6}
    .btnRow{display:flex; gap:8px; flex-wrap:wrap}
    .btn{
      border:1px solid var(--border); background:#fff; border-radius:12px; padding:9px 10px; cursor:pointer;
      font-weight:750;
    }
    .btn:hover{border-color:#c7d2fe}
    .btn.primary{border-color:#bfdbfe; background:rgba(37,99,235,.08)}
    .btn.danger{border-color:rgba(239,68,68,.35); background:rgba(239,68,68,.08); color:#991b1b}
    .btn:disabled{opacity:.5; cursor:not-allowed}
    .metaLine{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
    .pill{padding:6px 10px; border-radius:999px; border:1px solid var(--border); background:rgba(0,0,0,.02); font-size:12px; color:var(--muted)}
    dialog{border:1px solid var(--border); background:#fff; border-radius:16px; box-shadow:var(--shadow); width:min(760px, 94vw)}
    dialog::backdrop{background:rgba(0,0,0,.55)}
    .modalHead{padding:14px 16px; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:center}
    .modalBody{padding:14px 16px}
    .modalFoot{padding:14px 16px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end}
    label{display:block; font-size:12px; color:var(--muted); margin:10px 0 6px}
    input[type="text"], textarea{
      width:100%; border:1px solid var(--border); border-radius:14px; padding:12px 12px;
      outline:none; font-size:14px; background:#fff;
    }
    textarea{min-height:220px; resize:vertical; line-height:1.7}
    .hr{height:1px; background:var(--border); margin:12px 0}
    .small{font-size:12px; color:var(--muted); line-height:1.6}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="toprow">
        <div>
          <h1 id="siteTitle">社内マニュアル</h1>
          <div class="sub" id="siteDesc"></div>
        </div>
        <div class="btnRow">
          <button class="btn" id="copyLinkBtn">この詳細リンクをコピー</button>
          <button class="btn" id="exportBtn">書き出し</button>
          <button class="btn" id="importBtn">読み込み</button>
          <button class="btn danger" id="resetBtn">初期化</button>
          <span class="pill" id="modePill">閲覧</span>
        </div>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="grid">
      <div class="panel">
        <h2>
          <span>目次</span>
          <button class="btn primary" id="addCatBtn">＋カテゴリ</button>
        </h2>
        <div class="body">
          <input class="search" id="q" type="search" placeholder="検索（カテゴリ/項目/本文）" />
          <div class="small" id="tocHint" style="margin-top:10px"></div>
        </div>
        <div id="toc"></div>
      </div>

      <div class="panel">
        <h2>
          <span id="detailTitle">詳細</span>
          <button class="btn primary" id="editItemBtn">編集</button>
        </h2>
        <div class="body">
          <div class="metaLine">
            <span class="pill" id="detailCatPill">-</span>
            <span class="pill" id="detailUpdatedPill">更新: -</span>
          </div>
          <div style="height:10px"></div>
          <div class="hint" id="detailNote">左から項目を選んでください。</div>
          <div class="hr"></div>
          <div class="content" id="detailBody"></div>
          <div style="height:14px"></div>
          <div class="btnRow">
            <button class="btn" id="addItemBtn">＋見出し（項目）</button>
            <button class="btn danger" id="deleteItemBtn">この項目を削除</button>
            <span class="pill k" id="detailIds">#</span>
          </div>
          <div class="small" style="margin-top:10px">
            ※編集内容は <strong>この端末のブラウザ</strong> に保存されます（localStorage）。
            別端末と同期したいときは「書き出し→読み込み」。
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- カテゴリ編集 -->
  <dialog id="catDlg">
    <div class="modalHead">
      <strong id="catDlgTitle">カテゴリ</strong>
      <span class="pill k" id="catIdPill">ID:-</span>
    </div>
    <div class="modalBody">
      <label>カテゴリ名</label>
      <input type="text" id="catName" placeholder="例：dカード / 手続き / トラブル対応" />
      <div class="small">カテゴリを削除すると、その中の項目も消えます。</div>
    </div>
    <div class="modalFoot">
      <button class="btn" id="catCancel">キャンセル</button>
      <button class="btn danger" id="catDelete">削除</button>
      <button class="btn primary" id="catSave">保存</button>
    </div>
  </dialog>

  <!-- 項目編集 -->
  <dialog id="itemDlg">
    <div class="modalHead">
      <strong id="itemDlgTitle">項目</strong>
      <span class="pill k" id="itemIdPill">ID:-</span>
    </div>
    <div class="modalBody">
      <label>見出し（項目名）</label>
      <input type="text" id="itemTitle" placeholder="例：GOLD / プラチナ / 本人確認" />
      <label>メモ（任意・目次に表示）</label>
      <input type="text" id="itemNote" placeholder="例：年会費/特典/注意点 など" />
      <label>本文</label>
      <textarea id="itemBody" placeholder="■ 目的&#10;...&#10;&#10;■ 手順&#10;1. ..."></textarea>
    </div>
    <div class="modalFoot">
      <button class="btn" id="itemCancel">キャンセル</button>
      <button class="btn primary" id="itemSave">保存</button>
    </div>
  </dialog>

  <!-- JSON import -->
  <dialog id="importDlg">
    <div class="modalHead">
      <strong>JSON読み込み</strong>
    </div>
    <div class="modalBody">
      <label>ここにJSONを貼って読み込み</label>
      <textarea id="importText" placeholder='{"site":{"title":"...","desc":"..."},"categories":[...]}'></textarea>
      <div class="small">読み込むとこの端末のデータが上書きされます。先に「書き出し」でバックアップ推奨。</div>
    </div>
    <div class="modalFoot">
      <button class="btn" id="importCancel">閉じる</button>
      <button class="btn primary" id="importDo">読み込む</button>
    </div>
  </dialog>

  <script>
    // ===== 設定 =====
    const STORAGE_KEY = "manual_2layer_v1";
    const isEditMode = new URLSearchParams(location.search).get("edit") === "1";

    const $ = (id) => document.getElementById(id);
    function nowISO(){ return new Date().toISOString(); }
    function fmt(iso){
      try{
        const d = new Date(iso);
        return d.toLocaleString("ja-JP", { year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });
      }catch(e){ return "-"; }
    }
    function shortId(){ return Math.random().toString(36).slice(2, 8) + Math.random().toString(36).slice(2, 6); }
    function normalize(s){ return String(s||"").toLowerCase().trim(); }
    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));
    }

    // ===== データ =====
    function defaultData(){
      const t = nowISO();
      return {
        site: {
          title: "社内マニュアル",
          desc: "カテゴリ → 見出し（項目）→ 詳細。編集はURL末尾に ?edit=1"
        },
        categories: [
          {
            id:"dcards",
            title:"dカード",
            updatedAt:t,
            items:[
              { id:"gold", title:"GOLD", note:"年会費 / 特典 / 申込条件", body:"■ 目的\nGOLDの要点をまとめる\n\n■ 手順\n1. ...\n2. ...\n\n■ 注意点\n・...", createdAt:t, updatedAt:t },
              { id:"plat", title:"プラチナ", note:"対象者 / 注意点", body:"■ 注意\n・規約を確認\n・例外は相談", createdAt:t, updatedAt:t }
            ]
          },
          {
            id:"procedure",
            title:"手続き",
            updatedAt:t,
            items:[
              { id:"kyc", title:"本人確認", note:"差し戻し例", body:"■ 差し戻し例\n・画像不鮮明\n・期限切れ\n・住所不一致", createdAt:t, updatedAt:t }
            ]
          }
        ]
      };
    }

    const state = {
      data: loadData(),
      query: "",
      current: { catId:null, itemId:null }
    };

    function loadData(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return defaultData();
        const parsed = JSON.parse(raw);
        if(!parsed?.categories || !Array.isArray(parsed.categories)) return defaultData();
        return parsed;
      }catch(e){
        return defaultData();
      }
    }
    function saveData(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
      render();
    }

    // ===== ルーティング（直リンク） #/c/<catId>/i/<itemId> =====
    function getHash(){
      const h = location.hash || "";
      const m = h.match(/^#\/c\/([^\/]+)\/i\/([^\/]+)$/);
      if(!m) return {catId:null,itemId:null};
      return { catId: decodeURIComponent(m[1]), itemId: decodeURIComponent(m[2]) };
    }
    function setHash(catId, itemId){
      location.hash = `#/c/${encodeURIComponent(catId)}/i/${encodeURIComponent(itemId)}`;
    }

    function findCat(catId){ return state.data.categories.find(c=>c.id===catId) || null; }
    function findItem(catId, itemId){
      const c = findCat(catId);
      if(!c) return null;
      return c.items.find(i=>i.id===itemId) || null;
    }

    // ===== 検索フィルタ =====
    function filterCats(){
      const q = normalize(state.query);
      if(!q) return state.data.categories;

      const out = [];
      for(const c of state.data.categories){
        const catHit = normalize(c.title).includes(q);
        const items = c.items.filter(i=>{
          const hay = normalize(`${i.title} ${i.note||""} ${i.body||""}`);
          return hay.includes(q);
        });
        if(catHit){
          out.push({...c, items:[...c.items]});
        }else if(items.length){
          out.push({...c, items});
        }
      }
      return out;
    }

    // ===== 描画 =====
    function renderHeader(){
      $("siteTitle").textContent = state.data.site?.title || "マニュアル";
      const desc = state.data.site?.desc || "";
      $("siteDesc").innerHTML = `${escapeHtml(desc)}（編集は <span class="k">?edit=1</span>）`;
      document.title = state.data.site?.title || "マニュアル";

      $("modePill").textContent = isEditMode ? "編集" : "閲覧";
      $("addCatBtn").disabled = !isEditMode;
      $("importBtn").disabled = !isEditMode;
      $("resetBtn").disabled = !isEditMode;

      $("tocHint").innerHTML = isEditMode
        ? "編集モード：カテゴリ/項目/本文をサイト上で編集できます。"
        : "閲覧モード：編集するにはURL末尾に <span class='k'>?edit=1</span> を付けて開いてください。";
    }

    function markActive(){
      const {catId,itemId} = state.current;
      document.querySelectorAll(".itemBtn").forEach(btn=>{
        const ok = btn.dataset.cat === catId && btn.dataset.item === itemId;
        btn.classList.toggle("active", ok);
      });
    }

    function renderTOC(){
      const tocEl = $("toc");
      const cats = filterCats();
      tocEl.innerHTML = "";

      for(const c of cats){
        const d = document.createElement("details");
        d.open = true;

        const s = document.createElement("summary");
        s.innerHTML = `
          <span>${escapeHtml(c.title)}</span>
          <span class="badge">${c.items.length}件</span>
        `;
        d.appendChild(s);

        const box = document.createElement("div");
        box.className = "items";

        // カテゴリ設定（編集モードのみ）
        if(isEditMode){
          const editCatBtn = document.createElement("button");
          editCatBtn.className = "itemBtn";
          editCatBtn.type = "button";
          editCatBtn.innerHTML = `
            <div>
              <div class="itemTitle">⚙️ カテゴリ設定</div>
              <div class="itemNote">名称変更 / 削除</div>
            </div>
            <div class="badge k">c:${escapeHtml(c.id)}</div>
          `;
          editCatBtn.addEventListener("click", ()=> openCatEditor(c.id));
          box.appendChild(editCatBtn);
        }

        for(const it of c.items){
          const b = document.createElement("button");
          b.className = "itemBtn";
          b.type = "button";
          b.dataset.cat = c.id;
          b.dataset.item = it.id;
          b.innerHTML = `
            <div>
              <div class="itemTitle">${escapeHtml(it.title)}</div>
              <div class="itemNote">${escapeHtml(it.note||"")}</div>
            </div>
            <div class="badge k">#${escapeHtml(c.id)}/${escapeHtml(it.id)}</div>
          `;
          b.addEventListener("click", ()=> openDetail(c.id, it.id));
          box.appendChild(b);
        }

        d.appendChild(box);
        tocEl.appendChild(d);
      }

      markActive();
    }

    function openDetail(catId, itemId){
      const c = findCat(catId);
      const it = findItem(catId, itemId);
      if(!c || !it) return;

      state.current = {catId, itemId};
      setHash(catId, itemId);

      $("detailTitle").textContent = `${c.title} / ${it.title}`;
      $("detailCatPill").textContent = `カテゴリ: ${c.title}`;
      $("detailUpdatedPill").textContent = `更新: ${fmt(it.updatedAt || it.createdAt)}`;
      $("detailNote").textContent = it.note || "";
      $("detailBody").textContent = it.body || "";
      $("detailIds").textContent = `c:${c.id} / i:${it.id}`;

      $("editItemBtn").disabled = !isEditMode;
      $("addItemBtn").disabled = !isEditMode;
      $("deleteItemBtn").disabled = !isEditMode;

      markActive();
      $("detailTitle").scrollIntoView({behavior:"smooth", block:"start"});
    }

    function ensureFirstSelection(){
      // ハッシュが有効ならそれ優先
      const h = getHash();
      if(h.catId && h.itemId && findItem(h.catId, h.itemId)){
        openDetail(h.catId, h.itemId);
        return;
      }
      // 現在選択が有効なら維持
      if(state.current.catId && state.current.itemId && findItem(state.current.catId, state.current.itemId)){
        openDetail(state.current.catId, state.current.itemId);
        return;
      }
      // 最初の項目へ
      const firstCat = state.data.categories[0];
      const firstItem = firstCat?.items?.[0];
      if(firstCat && firstItem){
        openDetail(firstCat.id, firstItem.id);
      }
    }

    function render(){
      renderHeader();
      renderTOC();
      ensureFirstSelection();
    }

    // ===== 編集：カテゴリ =====
    function openCatCreate(){
      $("catDlgTitle").textContent = "カテゴリ追加";
      $("catIdPill").textContent = "ID:(自動生成)";
      $("catName").value = "";
      $("catDlg").dataset.catId = "";
      $("catDelete").style.display = "none";
      $("catDlg").showModal();
      $("catName").focus();
    }

    function openCatEditor(catId){
      const c = findCat(catId);
      if(!c) return;
      $("catDlgTitle").textContent = "カテゴリ編集";
      $("catIdPill").textContent = `ID:${c.id}`;
      $("catName").value = c.title || "";
      $("catDlg").dataset.catId = c.id;
      $("catDelete").style.display = "";
      $("catDlg").showModal();
      $("catName").focus();
    }

    function saveCat(){
      const catId = $("catDlg").dataset.catId || "";
      const name = $("catName").value.trim() || "（無題カテゴリ）";
      const t = nowISO();

      if(catId){
        const c = findCat(catId);
        if(!c) return;
        c.title = name;
        c.updatedAt = t;
      }else{
        const newId = shortId();
        state.data.categories.unshift({ id:newId, title:name, updatedAt:t, items:[] });
      }
      saveData();
      $("catDlg").close();
    }

    function deleteCat(){
      const catId = $("catDlg").dataset.catId || "";
      if(!catId) return;
      if(!confirm("このカテゴリを削除します（中の項目も消えます）。よい？")) return;

      const idx = state.data.categories.findIndex(c=>c.id===catId);
      if(idx>=0) state.data.categories.splice(idx,1);

      if(state.current.catId === catId){
        state.current = {catId:null, itemId:null};
        location.hash = "#/";
      }
      saveData();
      $("catDlg").close();
    }

    // ===== 編集：項目 =====
    function openItemCreate(){
      const catId = state.current.catId || state.data.categories[0]?.id;
      if(!catId){
        alert("先にカテゴリを作ってください");
        return;
      }
      $("itemDlgTitle").textContent = "項目追加";
      $("itemIdPill").textContent = "ID:(自動生成)";
      $("itemTitle").value = "";
      $("itemNote").value = "";
      $("itemBody").value = "■ 目的\n\n■ 手順\n1. \n2. \n\n■ 注意点\n・\n\n■ トラブル時\n・";
      $("itemDlg").dataset.catId = catId;
      $("itemDlg").dataset.itemId = "";
      $("itemDlg").showModal();
      $("itemTitle").focus();
    }

    function openItemEditor(){
      const {catId,itemId} = state.current;
      if(!catId || !itemId) return;
      const it = findItem(catId, itemId);
      if(!it) return;

      $("itemDlgTitle").textContent = "項目編集";
      $("itemIdPill").textContent = `ID:${it.id}`;
      $("itemTitle").value = it.title || "";
      $("itemNote").value = it.note || "";
      $("itemBody").value = it.body || "";
      $("itemDlg").dataset.catId = catId;
      $("itemDlg").dataset.itemId = itemId;
      $("itemDlg").showModal();
      $("itemTitle").focus();
    }

    function saveItem(){
      const catId = $("itemDlg").dataset.catId || "";
      const itemId = $("itemDlg").dataset.itemId || "";
      const c = findCat(catId);
      if(!c) return;

      const title = $("itemTitle").value.trim() || "（無題項目）";
      const note  = $("itemNote").value.trim();
      const body  = $("itemBody").value;
      const t = nowISO();

      if(itemId){
        const it = findItem(catId, itemId);
        if(!it) return;
        it.title = title;
        it.note = note;
        it.body = body;
        it.updatedAt = t;
        state.current = {catId, itemId};
      }else{
        const newId = shortId();
        c.items.unshift({ id:newId, title, note, body, createdAt:t, updatedAt:t });
        state.current = {catId, itemId:newId};
      }
      c.updatedAt = t;
      saveData();
      $("itemDlg").close();
      openDetail(state.current.catId, state.current.itemId);
    }

    function deleteItem(){
      const {catId,itemId} = state.current;
      if(!catId || !itemId) return;
      const c = findCat(catId);
      if(!c) return;
      if(!confirm("この項目を削除します。よい？")) return;

      const idx = c.items.findIndex(i=>i.id===itemId);
      if(idx>=0) c.items.splice(idx,1);
      c.updatedAt = nowISO();

      // 次の表示先
      let nextCat = c;
      let nextItem = c.items[0] || null;

      if(!nextItem){
        nextCat = state.data.categories.find(x=>x.items.length) || null;
        nextItem = nextCat?.items?.[0] || null;
      }

      if(nextCat && nextItem){
        state.current = {catId: nextCat.id, itemId: nextItem.id};
      }else{
        state.current = {catId:null, itemId:null};
        location.hash = "#/";
      }

      saveData();
    }

    // ===== Export / Import / Reset =====
    function doExport(){
      const json = JSON.stringify(state.data, null, 2);
      const blob = new Blob([json], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "manual_backup.json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function openImport(){
      $("importText").value = "";
      $("importDlg").showModal();
      $("importText").focus();
    }

    function doImport(){
      try{
        const raw = $("importText").value.trim();
        const parsed = JSON.parse(raw);
        if(!parsed?.categories || !Array.isArray(parsed.categories)) throw new Error("categories が見つからない");

        parsed.site = parsed.site || {title:"マニュアル", desc:""};
        parsed.categories = parsed.categories.map(c=>({
          id: String(c.id || shortId()).slice(0, 24),
          title: String(c.title || "（無題カテゴリ）"),
          updatedAt: c.updatedAt || nowISO(),
          items: Array.isArray(c.items) ? c.items.map(i=>({
            id: String(i.id || shortId()).slice(0, 24),
            title: String(i.title || "（無題項目）"),
            note: String(i.note || ""),
            body: String(i.body || ""),
            createdAt: i.createdAt || nowISO(),
            updatedAt: i.updatedAt || i.createdAt || nowISO(),
          })) : []
        }));

        state.data = parsed;
        state.current = {catId:null, itemId:null};
        saveData();
        $("importDlg").close();
      }catch(e){
        alert("読み込み失敗: " + (e?.message || e));
      }
    }

    function doReset(){
      if(!confirm("この端末の保存データを初期化します。よい？")) return;
      localStorage.removeItem(STORAGE_KEY);
      state.data = defaultData();
      state.current = {catId:null, itemId:null};
      render();
    }

    // ===== イベント =====
    $("q").addEventListener("input", (e)=>{ state.query = e.target.value; renderTOC(); });

    window.addEventListener("hashchange", ()=>{
      const h = getHash();
      if(h.catId && h.itemId && findItem(h.catId, h.itemId)){
        openDetail(h.catId, h.itemId);
      }
    });

    $("copyLinkBtn").addEventListener("click", async ()=>{
      const url = location.href;
      try{
        await navigator.clipboard.writeText(url);
        alert("リンクをコピーしました！");
      }catch(e){
        prompt("コピーできない場合はこれを手動コピーしてね", url);
      }
    });

    $("exportBtn").addEventListener("click", doExport);
    $("importBtn").addEventListener("click", ()=> isEditMode ? openImport() : alert("読み込みは編集モードで"));
    $("resetBtn").addEventListener("click", ()=> isEditMode ? doReset() : alert("初期化は編集モードで"));

    $("addCatBtn").addEventListener("click", ()=> isEditMode ? openCatCreate() : alert("編集するには ?edit=1"));
    $("addItemBtn").addEventListener("click", ()=> isEditMode ? openItemCreate() : alert("編集するには ?edit=1"));
    $("editItemBtn").addEventListener("click", ()=> isEditMode ? openItemEditor() : alert("編集するには ?edit=1"));
    $("deleteItemBtn").addEventListener("click", ()=> isEditMode ? deleteItem() : alert("編集するには ?edit=1"));

    $("catCancel").addEventListener("click", ()=> $("catDlg").close());
    $("catSave").addEventListener("click", saveCat);
    $("catDelete").addEventListener("click", deleteCat);

    $("itemCancel").addEventListener("click", ()=> $("itemDlg").close());
    $("itemSave").addEventListener("click", saveItem);

    $("importCancel").addEventListener("click", ()=> $("importDlg").close());
    $("importDo").addEventListener("click", doImport);

    // ===== 初期描画 =====
    render();
  </script>
</body>
</html>
