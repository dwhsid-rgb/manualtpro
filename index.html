<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>社内マニュアル</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#fff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --accent:#2563eb;
  --danger:#ef4444;
  --shadow:0 10px 24px rgba(0,0,0,.08);
  --r:16px;
  --headerH:72px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  position:sticky;
  top:0;
  z-index:30;
  background:rgba(246,247,251,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:16px;
}

.headerInner{
  display:flex;
  gap:12px;
  align-items:flex-start;
}

.headerText{
  flex:1;
  min-width:0;
}

h1{
  margin:6px 0 0;
  font-size:26px;
}

.sub{
  margin:6px 0 12px;
  color:var(--muted);
  font-size:13px;
}

.btnRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}

.btn{
  border:1px solid var(--border);
  background:#fff;
  border-radius:12px;
  padding:8px 10px;
  cursor:pointer;
  font-weight:700;
}

.btn:hover{
  background:#f9fafb;
}

.modePill{
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:999px;
  background:#fff;
  font-size:12px;
  color:var(--muted);
}

.panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  overflow:hidden;
  margin-top:14px;
}

.panel h2{
  margin:0;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  font-size:16px;
}

.panel .body{
  padding:14px 16px;
}

details{
  border-top:1px solid var(--border);
}

summary{
  padding:12px 16px;
  font-weight:800;
  cursor:pointer;
}

.item{
  border:1px solid var(--border);
  border-radius:12px;
  margin:6px;
  padding:10px;
  cursor:pointer;
  background:#fff;
}

.item:hover{
  background:#f9fafb;
}

.itemTitle{
  font-weight:700;
}

.itemNote{
  font-size:12px;
  color:var(--muted);
}

.hidden{
  display:none;
}

.content{
  white-space:pre-wrap;
  line-height:1.8;
}

/* ハンバーガーボタン */
.menuBtn{
  width:44px;
  height:44px;
  border:1px solid var(--border);
  border-radius:12px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex:0 0 auto;
  margin-top:2px;
}

.menuBtn:hover{
  background:#f9fafb;
}

.menuIcon{
  width:18px;
  height:14px;
  position:relative;
}

.menuIcon span{
  position:absolute;
  left:0;
  width:100%;
  height:2px;
  background:#111827;
  border-radius:999px;
}

.menuIcon span:nth-child(1){top:0}
.menuIcon span:nth-child(2){top:6px}
.menuIcon span:nth-child(3){top:12px}

/* サイドメニュー */
.drawerOverlay{
  position:fixed;
  inset:0;
  background:rgba(17,24,39,.4);
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
  z-index:90;
}

.drawer{
  position:fixed;
  top:0;
  left:0;
  width:min(360px,86vw);
  height:100vh;
  background:#fff;
  border-right:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.15);
  transform:translateX(-100%);
  transition:.25s ease;
  z-index:100;
  display:flex;
  flex-direction:column;
}

.drawer.open{
  transform:translateX(0);
}

.drawerOverlay.open{
  opacity:1;
  pointer-events:auto;
}

.drawerHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:16px;
  border-bottom:1px solid var(--border);
}

.drawerTitle{
  font-size:16px;
  font-weight:800;
}

.drawerClose{
  border:1px solid var(--border);
  background:#fff;
  border-radius:10px;
  width:36px;
  height:36px;
  cursor:pointer;
  font-size:18px;
  line-height:1;
}

.drawerBody{
  overflow:auto;
  padding:8px 0 20px;
}

.drawerCat{
  border-bottom:1px solid var(--border);
}

.drawerCatBtn{
  width:100%;
  text-align:left;
  border:none;
  background:#fff;
  padding:14px 16px;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
}

.drawerCatBtn:hover{
  background:#f9fafb;
}

.drawerItems{
  padding:0 8px 10px;
}

.drawerItem{
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 12px;
  margin:6px 0;
  background:#fff;
  cursor:pointer;
}

.drawerItem:hover{
  background:#f9fafb;
}

.drawerItemTitle{
  font-size:14px;
  font-weight:700;
}

.drawerItemNote{
  margin-top:4px;
  font-size:12px;
  color:var(--muted);
}

.emptyText{
  padding:18px 16px;
  color:var(--muted);
  font-size:14px;
}

@media (max-width:640px){
  h1{font-size:22px}
  .btnRow{gap:6px}
  .btn{font-size:13px}
}
</style>
</head>

<body>

<div id="drawerOverlay" class="drawerOverlay"></div>

<aside id="drawer" class="drawer" aria-hidden="true">
  <div class="drawerHeader">
    <div class="drawerTitle">項目一覧</div>
    <button id="drawerCloseBtn" class="drawerClose" type="button" aria-label="閉じる">×</button>
  </div>
  <div id="drawerBody" class="drawerBody"></div>
</aside>

<header>
  <div class="wrap">
    <div class="headerInner">

      <button id="menuBtn" class="menuBtn" type="button" aria-label="メニューを開く">
        <div class="menuIcon" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </button>

      <div class="headerText">
        <h1 id="siteTitle">社内マニュアル</h1>
        <div class="sub" id="siteDesc">読み込み中...</div>

        <div class="btnRow">
          <button class="btn" id="backBtn" style="display:none">← 一覧に戻る</button>
          <button class="btn" id="copyLinkBtn">リンクコピー</button>
          <button class="btn" id="loadPublishedBtn">公開データ読み込み</button>
          <button class="btn" id="exportBtn">data.json書き出し</button>
          <button class="btn" id="importBtn">読み込み</button>
          <span id="modePill" class="modePill">閲覧</span>
        </div>
      </div>

    </div>
  </div>
</header>

<div class="wrap">

  <div id="listView" class="panel">
    <h2>目次</h2>
    <div id="toc"></div>
  </div>

  <div id="detailView" class="panel hidden">
    <h2 id="detailTitle"></h2>

    <div class="body">
      <div id="detailNote" style="color:#6b7280;margin-bottom:10px"></div>
      <div id="detailBody" class="content"></div>
    </div>
  </div>

</div>

<script>
const STORAGE_KEY="manual_browser_editor_simple_v1"
const isEditMode=new URLSearchParams(location.search).get("edit")==="1"
const $=id=>document.getElementById(id)

const state={
  data:null,
  current:{catId:null,itemId:null},
  drawerOpen:false
}

function defaultData(){
  return{
    site:{
      title:"社内マニュアル",
      desc:"カテゴリ → 項目 → 詳細"
    },
    categories:[]
  }
}

function saveLocal(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state.data))
  render()
}

function loadLocal(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY)
    if(!raw)return null
    return JSON.parse(raw)
  }catch{
    return null
  }
}

async function loadPublished(){
  try{
    const res=await fetch("./data.json?v="+Date.now(),{cache:"no-store"})
    const data=await res.json()
    state.data=data
    saveLocal()
    alert("公開データを読み込みました")
  }catch(e){
    alert("公開データの読み込みに失敗しました")
    console.error(e)
  }
}

function setHash(c,i){
  location.hash="#/c/"+encodeURIComponent(c)+"/i/"+encodeURIComponent(i)
}

function getHash(){
  const m=(location.hash||"").match(/^#\/c\/([^/]+)\/i\/([^/]+)/)
  if(!m)return{}
  return{
    catId:decodeURIComponent(m[1]),
    itemId:decodeURIComponent(m[2])
  }
}

function clearHash(){
  history.replaceState(null,"",location.pathname+location.search)
}

function findCat(id){
  return state.data.categories.find(c=>c.id===id)
}

function findItem(catId,itemId){
  const cat=findCat(catId)
  return cat?.items?.find(x=>x.id===itemId)
}

function showList(){
  $("listView").classList.remove("hidden")
  $("detailView").classList.add("hidden")
  $("backBtn").style.display="none"
}

function showDetail(){
  $("listView").classList.add("hidden")
  $("detailView").classList.remove("hidden")
  $("backBtn").style.display=""
}

function openDrawer(){
  state.drawerOpen=true
  $("drawer").classList.add("open")
  $("drawerOverlay").classList.add("open")
  $("drawer").setAttribute("aria-hidden","false")
}

function closeDrawer(){
  state.drawerOpen=false
  $("drawer").classList.remove("open")
  $("drawerOverlay").classList.remove("open")
  $("drawer").setAttribute("aria-hidden","true")
}

function renderTOC(){
  const toc=$("toc")
  toc.innerHTML=""

  if(!state.data.categories.length){
    toc.innerHTML='<div class="emptyText">カテゴリがありません</div>'
    return
  }

  state.data.categories.forEach(c=>{
    const d=document.createElement("details")
    d.open=true

    const s=document.createElement("summary")
    s.textContent=c.title
    d.appendChild(s)

    ;(c.items||[]).forEach(it=>{
      const el=document.createElement("div")
      el.className="item"
      el.innerHTML=
        '<div class="itemTitle">'+escapeHtml(it.title||"無題")+'</div>'+
        '<div class="itemNote">'+escapeHtml(it.note||"")+'</div>'

      el.onclick=()=>openDetail(c.id,it.id)
      d.appendChild(el)
    })

    if(!c.items || !c.items.length){
      const empty=document.createElement("div")
      empty.className="emptyText"
      empty.textContent="項目がありません"
      d.appendChild(empty)
    }

    toc.appendChild(d)
  })
}

function renderDrawer(){
  const body=$("drawerBody")
  body.innerHTML=""

  if(!state.data.categories.length){
    body.innerHTML='<div class="emptyText">カテゴリがありません</div>'
    return
  }

  state.data.categories.forEach(c=>{
    const wrap=document.createElement("div")
    wrap.className="drawerCat"

    const catBtn=document.createElement("button")
    catBtn.type="button"
    catBtn.className="drawerCatBtn"
    catBtn.textContent=c.title
    catBtn.onclick=()=>{
      showList()
      closeDrawer()

      const target=[...document.querySelectorAll("#toc details summary")]
        .find(el=>el.textContent===c.title)

      if(target){
        target.scrollIntoView({behavior:"smooth",block:"center"})
      }
    }

    wrap.appendChild(catBtn)

    const items=document.createElement("div")
    items.className="drawerItems"

    ;(c.items||[]).forEach(it=>{
      const item=document.createElement("div")
      item.className="drawerItem"
      item.innerHTML=
        '<div class="drawerItemTitle">'+escapeHtml(it.title||"無題")+'</div>'+
        '<div class="drawerItemNote">'+escapeHtml(it.note||"")+'</div>'

      item.onclick=()=>{
        openDetail(c.id,it.id)
        closeDrawer()
      }

      items.appendChild(item)
    })

    if(!c.items || !c.items.length){
      const empty=document.createElement("div")
      empty.className="emptyText"
      empty.textContent="項目がありません"
      items.appendChild(empty)
    }

    wrap.appendChild(items)
    body.appendChild(wrap)
  })
}

function openDetail(c,i){
  const cat=findCat(c)
  const it=findItem(c,i)
  if(!cat||!it)return

  state.current={catId:c,itemId:i}
  setHash(c,i)

  $("detailTitle").textContent=cat.title+" / "+it.title
  $("detailNote").textContent=it.note||""
  $("detailBody").textContent=it.body||""

  showDetail()
}

function render(){
  $("siteTitle").textContent=state.data.site?.title || "社内マニュアル"
  $("siteDesc").textContent=state.data.site?.desc || ""
  $("modePill").textContent=isEditMode ? "編集" : "閲覧"

  renderTOC()
  renderDrawer()

  const h=getHash()
  if(h.catId&&h.itemId){
    openDetail(h.catId,h.itemId)
  }else{
    showList()
  }
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;")
}

$("backBtn").onclick=()=>{
  state.current={catId:null,itemId:null}
  clearHash()
  showList()
}

$("copyLinkBtn").onclick=async()=>{
  try{
    await navigator.clipboard.writeText(location.href)
    alert("コピーしました")
  }catch{
    alert("コピーに失敗しました")
  }
}

$("loadPublishedBtn").onclick=loadPublished

$("exportBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(state.data,null,2)],{type:"application/json"})
  const url=URL.createObjectURL(blob)
  const a=document.createElement("a")
  a.href=url
  a.download="data.json"
  a.click()
  URL.revokeObjectURL(url)
}

$("importBtn").onclick=()=>{
  try{
    const raw=prompt("JSON貼り付け")
    if(!raw)return
    state.data=JSON.parse(raw)
    saveLocal()
    alert("読み込みました")
  }catch(e){
    alert("JSONの形式が正しくありません")
    console.error(e)
  }
}

$("menuBtn").onclick=openDrawer
$("drawerCloseBtn").onclick=closeDrawer
$("drawerOverlay").onclick=closeDrawer

window.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeDrawer()
})

window.addEventListener("hashchange",render)

state.data=loadLocal()||defaultData()
render()
</script>

</body>
</html>
