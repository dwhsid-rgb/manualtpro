<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>社内マニュアル</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#fff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --accent:#2563eb;
  --danger:#ef4444;
  --shadow:0 10px 24px rgba(0,0,0,.08);
  --r:16px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  position:sticky;
  top:0;
  z-index:30;
  background:rgba(246,247,251,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}
.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:16px;
}
.headerInner{
  display:flex;
  gap:12px;
  align-items:flex-start;
}
.headerText{
  flex:1;
  min-width:0;
}
h1{
  margin:6px 0 0;
  font-size:26px;
}
.sub{
  margin:6px 0 12px;
  color:var(--muted);
  font-size:13px;
}
.btnRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.btn{
  border:1px solid var(--border);
  background:#fff;
  border-radius:12px;
  padding:8px 10px;
  cursor:pointer;
  font-weight:700;
}
.btn:hover{background:#f9fafb}
.btnDanger{
  border-color:#fecaca;
  color:#b91c1c;
  background:#fff;
}
.modePill{
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:999px;
  background:#fff;
  font-size:12px;
  color:var(--muted);
}
.panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  overflow:hidden;
  margin-top:14px;
}
.panel h2{
  margin:0;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  font-size:16px;
}
.panel .body{padding:14px 16px}
details{border-top:1px solid var(--border)}
summary{
  padding:12px 16px;
  font-weight:800;
  cursor:pointer;
}
.item{
  border:1px solid var(--border);
  border-radius:12px;
  margin:6px;
  padding:10px;
  cursor:pointer;
  background:#fff;
}
.item:hover{background:#f9fafb}
.itemTitle{font-weight:700}
.itemNote{font-size:12px;color:var(--muted)}
.itemActions{
  margin-top:8px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.hidden{display:none !important}
.content{
  white-space:pre-wrap;
  line-height:1.8;
}
.menuBtn{
  width:44px;
  height:44px;
  border:1px solid var(--border);
  border-radius:12px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex:0 0 auto;
  margin-top:2px;
}
.menuBtn:hover{background:#f9fafb}
.menuIcon{
  width:18px;
  height:14px;
  position:relative;
}
.menuIcon span{
  position:absolute;
  left:0;
  width:100%;
  height:2px;
  background:#111827;
  border-radius:999px;
}
.menuIcon span:nth-child(1){top:0}
.menuIcon span:nth-child(2){top:6px}
.menuIcon span:nth-child(3){top:12px}
.drawerOverlay{
  position:fixed;
  inset:0;
  background:rgba(17,24,39,.4);
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
  z-index:90;
}
.drawer{
  position:fixed;
  top:0;
  left:0;
  width:min(360px,86vw);
  height:100vh;
  background:#fff;
  border-right:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.15);
  transform:translateX(-100%);
  transition:.25s ease;
  z-index:100;
  display:flex;
  flex-direction:column;
}
.drawer.open{transform:translateX(0)}
.drawerOverlay.open{
  opacity:1;
  pointer-events:auto;
}
.drawerHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:16px;
  border-bottom:1px solid var(--border);
}
.drawerTitle{
  font-size:16px;
  font-weight:800;
}
.drawerClose{
  border:1px solid var(--border);
  background:#fff;
  border-radius:10px;
  width:36px;
  height:36px;
  cursor:pointer;
  font-size:18px;
  line-height:1;
}
.drawerBody{
  overflow:auto;
  padding:8px 0 20px;
}
.drawerCat{border-bottom:1px solid var(--border)}
.drawerCatBtn{
  width:100%;
  text-align:left;
  border:none;
  background:#fff;
  padding:14px 16px;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
}
.drawerCatBtn:hover{background:#f9fafb}
.drawerItems{padding:0 8px 10px}
.drawerItem{
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 12px;
  margin:6px 0;
  background:#fff;
  cursor:pointer;
}
.drawerItem:hover{background:#f9fafb}
.drawerItemTitle{font-size:14px;font-weight:700}
.drawerItemNote{
  margin-top:4px;
  font-size:12px;
  color:var(--muted);
}
.emptyText{
  padding:18px 16px;
  color:var(--muted);
  font-size:14px;
}
.errorBox{
  margin:14px 16px 0;
  padding:12px 14px;
  border:1px solid #fecaca;
  background:#fff1f2;
  color:#991b1b;
  border-radius:12px;
  white-space:pre-wrap;
  line-height:1.6;
}
.editPanel{
  display:grid;
  gap:10px;
  margin-top:16px;
}
.input, .textarea{
  width:100%;
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 12px;
  font:inherit;
  background:#fff;
}
.textarea{
  min-height:220px;
  resize:vertical;
}
.label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:4px;
}
.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.siteEdit{
  margin-top:10px;
  display:grid;
  gap:8px;
}
@media (max-width:640px){
  h1{font-size:22px}
  .btnRow{gap:6px}
  .btn{font-size:13px}
}
</style>
</head>

<body>

<div id="drawerOverlay" class="drawerOverlay"></div>

<aside id="drawer" class="drawer" aria-hidden="true">
  <div class="drawerHeader">
    <div class="drawerTitle">項目一覧</div>
    <button id="drawerCloseBtn" class="drawerClose" type="button" aria-label="閉じる">×</button>
  </div>
  <div id="drawerBody" class="drawerBody"></div>
</aside>

<header>
  <div class="wrap">
    <div class="headerInner">
      <button id="menuBtn" class="menuBtn" type="button" aria-label="メニューを開く">
        <div class="menuIcon" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </button>

      <div class="headerText">
        <h1 id="siteTitle">社内マニュアル</h1>
        <div class="sub" id="siteDesc">読み込み中...</div>

        <div id="siteEdit" class="siteEdit hidden">
          <div>
            <div class="label">サイトタイトル</div>
            <input id="siteTitleInput" class="input" placeholder="社内マニュアル">
          </div>
          <div>
            <div class="label">サイト説明</div>
            <input id="siteDescInput" class="input" placeholder="カテゴリ → 項目 → 詳細">
          </div>
          <div class="row">
            <button class="btn" id="saveSiteBtn">サイト情報保存</button>
          </div>
        </div>

        <div class="btnRow">
          <button class="btn" id="backBtn" style="display:none">← 一覧に戻る</button>
          <button class="btn" id="copyLinkBtn">リンクコピー</button>
          <button class="btn" id="loadPublishedBtn">公開データ読み込み</button>
          <button class="btn" id="exportBtn">data.json書き出し</button>
          <button class="btn" id="importBtn">読み込み</button>
          <button class="btn hidden" id="addCatBtn">カテゴリ追加</button>
          <span id="modePill" class="modePill">閲覧</span>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="errorMount"></div>

  <div id="listView" class="panel">
    <h2>目次</h2>
    <div id="toc"></div>
  </div>

  <div id="detailView" class="panel hidden">
    <h2 id="detailTitle"></h2>
    <div class="body">
      <div id="detailNote" style="color:#6b7280;margin-bottom:10px"></div>
      <div id="detailBody" class="content"></div>

      <div id="editorPanel" class="editPanel hidden">
        <div>
          <div class="label">カテゴリ名</div>
          <input id="editCatTitle" class="input">
        </div>

        <div>
          <div class="label">項目タイトル</div>
          <input id="editTitle" class="input">
        </div>

        <div>
          <div class="label">補足</div>
          <input id="editNote" class="input">
        </div>

        <div>
          <div class="label">本文</div>
          <textarea id="editBody" class="textarea"></textarea>
        </div>

        <div class="row">
          <button class="btn" id="saveBtn">保存</button>
          <button class="btn btnDanger" id="deleteItemBtn">この項目を削除</button>
          <button class="btn btnDanger" id="deleteCatBtn">このカテゴリを削除</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){

const STORAGE_KEY = "manual_browser_editor_editable_v1";
const isEditMode = new URLSearchParams(location.search).get("edit") === "1";
const $ = id => document.getElementById(id);

const state = {
  data: null,
  current: { catId: null, itemId: null }
};

window.onerror = function(message, source, lineno){
  showError("JavaScriptエラーが発生しました\\n\\n" + message + "\\nline: " + lineno);
};

function showError(message){
  const mount = $("errorMount");
  if(mount) mount.innerHTML = '<div class="errorBox">' + escapeHtml(String(message)) + '</div>';
}

function clearError(){
  const mount = $("errorMount");
  if(mount) mount.innerHTML = "";
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function shortId(prefix="id"){
  return prefix + "_" + Math.random().toString(36).slice(2,10);
}

function defaultData(){
  return {
    site: {
      title: "社内マニュアル",
      desc: "カテゴリ → 項目 → 詳細"
    },
    categories: []
  };
}

function normalizeData(input){
  let raw = input;

  if(typeof raw === "string"){
    try{
      raw = JSON.parse(raw);
    }catch{}
  }

  if(Array.isArray(raw)){
    raw = { categories: raw };
  }

  if(raw && typeof raw === "object" && raw.data && typeof raw.data === "object"){
    raw = raw.data;
  }

  if(raw && typeof raw === "object" && raw.manual && typeof raw.manual === "object"){
    raw = raw.manual;
  }

  if(raw && typeof raw === "object" && Array.isArray(raw.cards) && !raw.categories){
    const groups = {};
    raw.cards.forEach((card, idx) => {
      const catName =
        card.category ||
        card.cat ||
        card.group ||
        card.section ||
        "未分類";

      if(!groups[catName]) groups[catName] = [];
      groups[catName].push({
        id: card.id || shortId("item"),
        title: card.title || card.name || ("項目" + (idx + 1)),
        note: card.note || card.summary || card.subtitle || "",
        body: card.body || card.content || card.text || card.description || ""
      });
    });

    raw = {
      site: {
        title: raw.title || "社内マニュアル",
        desc: raw.desc || raw.description || "カテゴリ → 項目 → 詳細"
      },
      categories: Object.keys(groups).map((name, idx) => ({
        id: shortId("cat"),
        title: name,
        items: groups[name]
      }))
    };
  }

  if(raw && typeof raw === "object" && !raw.site && (raw.title || raw.desc || raw.description || raw.categories)){
    raw = {
      site: {
        title: raw.title || "社内マニュアル",
        desc: raw.desc || raw.description || "カテゴリ → 項目 → 詳細"
      },
      categories: raw.categories || []
    };
  }

  if(!raw || typeof raw !== "object"){
    raw = defaultData();
  }

  const site = raw.site && typeof raw.site === "object" ? raw.site : {};
  const categoriesRaw = Array.isArray(raw.categories) ? raw.categories : [];

  return {
    site: {
      title: typeof site.title === "string" && site.title.trim() ? site.title : "社内マニュアル",
      desc: typeof site.desc === "string" ? site.desc : "カテゴリ → 項目 → 詳細"
    },
    categories: categoriesRaw.map((c, cIndex) => {
      const itemsRaw =
        Array.isArray(c?.items) ? c.items :
        Array.isArray(c?.cards) ? c.cards :
        Array.isArray(c?.children) ? c.children :
        [];

      return {
        id: typeof c?.id === "string" && c.id ? c.id : shortId("cat"),
        title: typeof c?.title === "string" && c.title ? c.title :
               typeof c?.name === "string" && c.name ? c.name :
               "カテゴリ" + (cIndex + 1),
        items: itemsRaw.map((it, iIndex) => ({
          id: typeof it?.id === "string" && it.id ? it.id : shortId("item"),
          title: typeof it?.title === "string" && it.title ? it.title :
                 typeof it?.name === "string" && it.name ? it.name :
                 "無題",
          note: typeof it?.note === "string" ? it.note :
                typeof it?.summary === "string" ? it.summary :
                typeof it?.subtitle === "string" ? it.subtitle : "",
          body: typeof it?.body === "string" ? it.body :
                typeof it?.content === "string" ? it.content :
                typeof it?.text === "string" ? it.text :
                typeof it?.description === "string" ? it.description : ""
        }))
      };
    })
  };
}

function parseImportText(raw){
  const text = String(raw).trim();

  try{
    return normalizeData(JSON.parse(text));
  }catch{}

  try{
    const unwrapped = JSON.parse(JSON.parse(text));
    return normalizeData(unwrapped);
  }catch{}

  throw new Error("JSONの形式が正しくありません");
}

function saveLocal(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
  }catch(e){
    console.error(e);
    showError("ローカル保存に失敗しました");
  }
  render();
}

function loadLocal(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){
    console.error(e);
    localStorage.removeItem(STORAGE_KEY);
    return null;
  }
}

async function loadPublished(){
  try{
    const res = await fetch("./data.json?v=" + Date.now(), { cache:"no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    state.data = normalizeData(data);
    saveLocal();
    alert("公開データを読み込みました");
  }catch(e){
    console.error(e);
    showError("公開データの読み込みに失敗しました\\n\\n" + (e.message || e));
    alert("公開データの読み込みに失敗しました");
  }
}

function setHash(c, i){
  location.hash = "#/c/" + encodeURIComponent(c) + "/i/" + encodeURIComponent(i);
}

function getHash(){
  const m = (location.hash || "").match(/^#\/c\/([^/]+)\/i\/([^/]+)/);
  if(!m) return {};
  return {
    catId: decodeURIComponent(m[1]),
    itemId: decodeURIComponent(m[2])
  };
}

function clearHash(){
  history.replaceState(null, "", location.pathname + location.search);
}

function findCat(id){
  return state.data.categories.find(c => c.id === id) || null;
}

function findItem(catId, itemId){
  const cat = findCat(catId);
  if(!cat) return null;
  return cat.items.find(x => x.id === itemId) || null;
}

function findCatAndItem(catId, itemId){
  const cat = findCat(catId);
  const item = findItem(catId, itemId);
  return { cat, item };
}

function showList(){
  $("listView").classList.remove("hidden");
  $("detailView").classList.add("hidden");
  $("backBtn").style.display = "none";
}

function showDetail(){
  $("listView").classList.add("hidden");
  $("detailView").classList.remove("hidden");
  $("backBtn").style.display = "";
}

function openDrawer(){
  $("drawer").classList.add("open");
  $("drawerOverlay").classList.add("open");
  $("drawer").setAttribute("aria-hidden","false");
}

function closeDrawer(){
  $("drawer").classList.remove("open");
  $("drawerOverlay").classList.remove("open");
  $("drawer").setAttribute("aria-hidden","true");
}

function renderTOC(){
  const toc = $("toc");
  toc.innerHTML = "";

  if(!state.data.categories.length){
    toc.innerHTML = '<div class="emptyText">カテゴリがありません</div>';
    return;
  }

  state.data.categories.forEach(c => {
    const d = document.createElement("details");
    d.open = true;
    d.dataset.catId = c.id;

    const s = document.createElement("summary");
    s.textContent = c.title;
    d.appendChild(s);

    if(isEditMode){
      const bar = document.createElement("div");
      bar.className = "itemActions";
      bar.style.padding = "0 12px 10px";

      const addBtn = document.createElement("button");
      addBtn.className = "btn";
      addBtn.textContent = "+ 項目追加";
      addBtn.onclick = (e) => {
        e.stopPropagation();
        const newItem = {
          id: shortId("item"),
          title: "新規項目",
          note: "",
          body: ""
        };
        c.items.push(newItem);
        saveLocal();
        openDetail(c.id, newItem.id);
      };

      bar.appendChild(addBtn);
      d.appendChild(bar);
    }

    if(!c.items.length){
      const empty = document.createElement("div");
      empty.className = "emptyText";
      empty.textContent = "項目がありません";
      d.appendChild(empty);
    }else{
      c.items.forEach(it => {
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML =
          '<div class="itemTitle">' + escapeHtml(it.title) + '</div>' +
          '<div class="itemNote">' + escapeHtml(it.note || "") + '</div>';

        el.onclick = () => openDetail(c.id, it.id);

        if(isEditMode){
          const actions = document.createElement("div");
          actions.className = "itemActions";

          const editBtn = document.createElement("button");
          editBtn.className = "btn";
          editBtn.textContent = "編集";
          editBtn.onclick = (e) => {
            e.stopPropagation();
            openDetail(c.id, it.id);
          };

          actions.appendChild(editBtn);
          el.appendChild(actions);
        }

        d.appendChild(el);
      });
    }

    toc.appendChild(d);
  });
}

function renderDrawer(){
  const body = $("drawerBody");
  body.innerHTML = "";

  if(!state.data.categories.length){
    body.innerHTML = '<div class="emptyText">カテゴリがありません</div>';
    return;
  }

  state.data.categories.forEach(c => {
    const wrap = document.createElement("div");
    wrap.className = "drawerCat";

    const catBtn = document.createElement("button");
    catBtn.type = "button";
    catBtn.className = "drawerCatBtn";
    catBtn.textContent = c.title;
    catBtn.onclick = () => {
      closeDrawer();
      showList();

      requestAnimationFrame(() => {
        const target = document.querySelector('#toc details[data-cat-id="' + cssEscape(c.id) + '"]');
        if(target){
          target.scrollIntoView({ behavior:"smooth", block:"start" });
        }
      });
    };

    wrap.appendChild(catBtn);

    const items = document.createElement("div");
    items.className = "drawerItems";

    if(!c.items.length){
      const empty = document.createElement("div");
      empty.className = "emptyText";
      empty.textContent = "項目がありません";
      items.appendChild(empty);
    }else{
      c.items.forEach(it => {
        const item = document.createElement("div");
        item.className = "drawerItem";
        item.innerHTML =
          '<div class="drawerItemTitle">' + escapeHtml(it.title) + '</div>' +
          '<div class="drawerItemNote">' + escapeHtml(it.note || "") + '</div>';
        item.onclick = () => {
          openDetail(c.id, it.id);
          closeDrawer();
        };
        items.appendChild(item);
      });
    }

    wrap.appendChild(items);
    body.appendChild(wrap);
  });
}

function fillEditor(cat, item){
  $("editCatTitle").value = cat.title || "";
  $("editTitle").value = item.title || "";
  $("editNote").value = item.note || "";
  $("editBody").value = item.body || "";
}

function openDetail(catId, itemId){
  const { cat, item } = findCatAndItem(catId, itemId);
  if(!cat || !item) return;

  state.current = { catId, itemId };
  setHash(catId, itemId);

  $("detailTitle").textContent = cat.title + " / " + item.title;
  $("detailNote").textContent = item.note || "";
  $("detailBody").textContent = item.body || "";

  $("editorPanel").classList.toggle("hidden", !isEditMode);
  if(isEditMode) fillEditor(cat, item);

  showDetail();
}

function render(){
  clearError();
  state.data = normalizeData(state.data);

  $("siteTitle").textContent = state.data.site.title;
  $("siteDesc").textContent = state.data.site.desc;
  $("modePill").textContent = isEditMode ? "編集" : "閲覧";
  $("addCatBtn").classList.toggle("hidden", !isEditMode);
  $("siteEdit").classList.toggle("hidden", !isEditMode);

  if(isEditMode){
    $(
